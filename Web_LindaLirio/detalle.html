<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Habitación | Linda Lirio</title>
    <link rel="stylesheet" href="style-habitaciones.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">LINDA LIRIO</div>
        <nav>
            <a href="habitaciones.html">Volver a Habitaciones</a>
        </nav>
    </header>

    <div class="page-layout" id="detalle-contenido">
        <!-- Aquí se inyectará la info mediante JS -->
        <h1 id="titulo-hab">Cargando...</h1>
        <p id="desc-hab"></p>
        <button class="btn-prim" onclick="alert('Reserva enviada a WhatsApp')">Reservar ahora</button>
    </div>

    <script>
        // Obtener el nombre de la habitación de la URL
        const params = new URLSearchParams(window.location.search);
        const hab = params.get('hab');
        
        // Base de datos ficticia de habitaciones
        const datosHabitaciones = {
            "Individual": { desc: "Habitación acogedora perfecta para viajeros solitarios.", precio: "S/ 90" },
            "Matrimonial": { desc: "Confort y elegancia para parejas.", precio: "S/ 150" },
            "Doble": { desc: "Espacio ideal para compartir con amigos.", precio: "S/ 180" }
        };

        if(datosHabitaciones[hab]) {
            document.getElementById('titulo-hab').innerText = hab;
            document.getElementById('desc-hab').innerText = datosHabitaciones[hab].desc + " Precio: " + datosHabitaciones[hab].precio;
        } else {
            document.getElementById('titulo-hab').innerText = "Habitación no encontrada";
        }
    </script>
</body>
</html>
